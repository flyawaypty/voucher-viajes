<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voucher de Viaje — FlyAway</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; color: #1a2b3c; display: flex; min-height: 100vh; }
.sidebar { width: 340px; min-width: 300px; background: #1a2b3c; color: #e8f0f7; padding: 20px 16px; overflow-y: auto; flex-shrink: 0; min-height: 100vh; }
.sidebar h1 { font-size: 17px; font-weight: 700; color: #fff; margin-bottom: 3px; }
.sidebar .sub { font-size: 11px; color: #7fa8c8; margin-bottom: 16px; }
.sec { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #7fa8c8; margin: 14px 0 6px; }
label { font-size: 11px; color: #b0cde6; display: block; margin-bottom: 2px; margin-top: 6px; }
input, select { width: 100%; padding: 6px 9px; border-radius: 5px; border: 1px solid #2d4a62; background: #243d52; color: #e8f0f7; font-size: 12px; outline: none; }
input:focus, select:focus { border-color: #4a9fd4; }
select option { background: #1a2b3c; }
.btn-add { display: block; width: 100%; margin-top: 8px; padding: 7px; background: #243d52; border: 1px dashed #4a9fd4; color: #4a9fd4; border-radius: 5px; font-size: 11px; cursor: pointer; }
.btn-add:hover { background: #2d5470; }
.tabs { display: flex; gap: 3px; margin-bottom: 14px; }
.tab { flex: 1; padding: 6px 4px; text-align: center; font-size: 11px; font-weight: 600; border-radius: 5px; cursor: pointer; border: 1px solid #2d4a62; background: #243d52; color: #7fa8c8; }
.tab.on { background: #1a6fa8; color: #fff; border-color: #1a6fa8; }
.fc { background: #1e3348; border-radius: 7px; padding: 10px; margin-bottom: 8px; border: 1px solid #2d4a62; }
.fc-head { display: flex; justify-content: space-between; align-items: center; font-size: 11px; font-weight: 600; color: #4a9fd4; margin-bottom: 8px; }
.btn-rm { background: none; border: none; color: #e05c5c; font-size: 12px; cursor: pointer; padding: 0 4px; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
.btn-lookup { width: 100%; margin-top: 8px; padding: 7px; border-radius: 5px; background: linear-gradient(135deg, #1a6fa8, #4a9fd4); color: #fff; font-size: 12px; font-weight: 600; border: none; cursor: pointer; }
.btn-lookup:disabled { opacity: .45; cursor: not-allowed; }
.status { font-size: 11px; margin-top: 6px; padding: 5px 8px; border-radius: 5px; display: none; }
.status.loading { display: block; background: #1a3a50; color: #7dc9f5; }
.status.ok { display: block; background: #0d3320; color: #5be0a0; }
.status.err { display: block; background: #3a1a1a; color: #e07070; }
.found { margin-top: 8px; padding: 8px; background: #152a3a; border-radius: 5px; display: none; font-size: 11px; border: 1px solid #2d5c40; }
.found.show { display: block; }
.dr { display: flex; justify-content: space-between; padding: 2px 0; }
.dr span:first-child { color: #7dc9f5; }
.dr span:last-child { color: #e8f0f7; font-weight: 600; }
.manual-dur { margin-top: 8px; padding: 6px 8px; background: #1a2f44; border-radius: 5px; border: 1px solid #2d4a62; }
.manual-dur label { color: #f0c060; margin-top: 0; }
.btn-gen { width: 100%; margin-top: 16px; padding: 11px; border-radius: 7px; background: linear-gradient(135deg, #1a6fa8, #4a9fd4); color: #fff; font-size: 13px; font-weight: 700; border: none; cursor: pointer; }
.type-selector { display: flex; gap: 4px; margin-bottom: 12px; }
.type-btn { flex: 1; padding: 7px 4px; text-align: center; font-size: 10px; font-weight: 600; border-radius: 5px; cursor: pointer; border: 1px solid #2d4a62; background: #243d52; color: #7fa8c8; }
.type-btn.on { background: #0d6fa8; color: #fff; border-color: #0d6fa8; }
.preview { flex: 1; padding: 20px; overflow-y: auto; background: #e8eef4; display: flex; flex-direction: column; align-items: center; }
.toolbar { width: 100%; max-width: 740px; display: flex; justify-content: flex-end; margin-bottom: 10px; }
.btn-dl { padding: 8px 16px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; background: #1a6fa8; color: #fff; }
.btn-dl:hover { opacity: .85; }

/* VOUCHER */
#voucher { background: #fff; width: 100%; max-width: 740px; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,.1); overflow: hidden; }
.vh { background: linear-gradient(135deg, #0a3d62, #1a6fa8); padding: 24px 30px; display: flex; justify-content: space-between; align-items: flex-start; }
.vh-logo { font-size: 20px; font-weight: 800; color: #fff; }
.vlocs { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 4px; }
.vloc { text-align: right; }
.vh-lbl { font-size: 9px; color: #7dc9f5; text-transform: uppercase; letter-spacing: 1px; }
.vh-val { font-size: 12px; font-weight: 700; color: #fff; }
.vh-val.big { font-size: 20px; letter-spacing: 2px; }
.vb { padding: 22px 30px; }
.vsec { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #7fa8c8; margin: 16px 0 10px; display: flex; align-items: center; gap: 8px; }
.vsec::after { content: ''; flex: 1; height: 1px; background: #e0ecf7; }
.vsec-total { font-size: 10px; color: #1a6fa8; font-weight: 700; background: #e8f4ff; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }

/* PASAJEROS — uno debajo del otro */
.v-paxes { display: flex; flex-direction: column; gap: 8px; }
.v-pax { background: #f0f7ff; border-left: 4px solid #1a6fa8; padding: 10px 16px; border-radius: 0 6px 6px 0; display: flex; flex-wrap: wrap; gap: 0 24px; }
.v-pax .pn { font-size: 13px; font-weight: 700; color: #0a3d62; width: 100%; margin-bottom: 4px; }
.v-pax .pt { font-size: 11px; color: #5a7fa0; margin-right: 16px; }

/* SEGMENTOS — altura fija para alinear */
.vseg { display: grid; grid-template-columns: 100px 1fr 100px; align-items: center; padding: 14px 0; border-bottom: 1px solid #f0f4f8; gap: 8px; }
.vseg:last-of-type { border-bottom: none; }
.vtb { text-align: center; }
.vtime { font-size: 22px; font-weight: 800; color: #0a3d62; line-height: 1; }
.vampm { font-size: 11px; font-weight: 700; color: #1a6fa8; margin-top: 1px; }
.vdate { font-size: 10px; color: #7fa8c0; margin-top: 3px; }
.vap { font-size: 14px; font-weight: 700; color: #1a6fa8; margin-top: 3px; }
.vapn { font-size: 9px; color: #8aa0b0; margin-top: 2px; line-height: 1.3; }
.vmid { display: flex; flex-direction: column; align-items: center; }
.vfnum { font-size: 10px; font-weight: 700; color: #fff; background: #1a6fa8; padding: 2px 10px; border-radius: 20px; margin-bottom: 6px; }
.vline { width: 100%; height: 2px; background: linear-gradient(90deg, #1a6fa8, #7dc9f5); position: relative; border-radius: 2px; }
.vline::before { content: '✈'; position: absolute; top: -9px; left: 50%; transform: translateX(-50%); font-size: 14px; color: #1a6fa8; }
.vdur { font-size: 10px; color: #7fa8c0; margin-top: 5px; }
.val { font-size: 10px; color: #7fa8c0; margin-top: 2px; }
.vcab { font-size: 10px; color: #7fa8c0; margin-top: 3px; background: #f0f7ff; padding: 1px 8px; border-radius: 10px; }

/* ESCALA */
.vescala { display: flex; align-items: center; justify-content: center; padding: 7px 16px; background: #fff8e8; border-left: 3px solid #e8a820; border-right: 3px solid #e8a820; gap: 8px; }
.vescala-text { font-size: 11px; color: #8a6010; }
.vescala-text strong { color: #5a3e00; }

.vfoot { background: #f7fafd; border-top: 2px solid #e0ecf7; padding: 12px 30px; display: flex; justify-content: space-between; align-items: center; }
.vfoot-note { font-size: 11px; color: #7fa8c0; }
.vfoot-logo { font-size: 12px; font-weight: 700; color: #1a6fa8; }
.vdiv { height: 5px; background: linear-gradient(90deg, #0a3d62, #1a6fa8, #7dc9f5); }
</style>
</head>
<body>
<div class="sidebar">
  <h1>✈ Voucher de Viaje</h1>
  <p class="sub">Ingresa el vuelo y la fecha — buscamos los detalles automáticamente.</p>
  <div class="tabs">
    <div class="tab on" onclick="switchTab('general',this)">General</div>
    <div class="tab" onclick="switchTab('vuelos',this)">Vuelos</div>
    <div class="tab" onclick="switchTab('pax',this)">Pasajeros</div>
  </div>

  <div id="tab-general">
    <div class="sec">Tipo de voucher</div>
    <div class="type-selector">
      <div class="type-btn on" onclick="setType('ida',this)">Solo ida</div>
      <div class="type-btn" onclick="setType('idavuelta',this)">Ida y vuelta</div>
      <div class="type-btn" onclick="setType('multi',this)">Múltiples tramos</div>
    </div>
    <div class="sec">Agencia</div>
    <label>Nombre de la agencia</label>
    <input id="agencia" value="FlyAway" oninput="render()">
    <label>Nota al pie</label>
    <input id="nota" value="Cada pasajero puede llevar una bolsa o mochila adicional como ítem personal." oninput="render()">
    <div class="sec">Localizadores</div>
    <div id="locs-list"></div>
    <button class="btn-add" onclick="addLoc()">+ Agregar localizador</button>
  </div>

  <div id="tab-vuelos" style="display:none">
    <div id="vuelos-ida-section">
      <div class="sec" id="label-ida">Vuelos de Ida</div>
      <div id="list-ida"></div>
      <button class="btn-add" onclick="addFlight('ida')">+ Agregar tramo de ida</button>
    </div>
    <div id="vuelos-vuelta-section" style="display:none">
      <div class="sec">Vuelos de Vuelta</div>
      <div id="list-vuelta"></div>
      <button class="btn-add" onclick="addFlight('vuelta')">+ Agregar tramo de vuelta</button>
    </div>
  </div>

  <div id="tab-pax" style="display:none">
    <div class="sec">Pasajeros</div>
    <div id="list-pax"></div>
    <button class="btn-add" onclick="addPax()">+ Agregar pasajero</button>
  </div>

  <button class="btn-gen" onclick="render()">↻ Actualizar vista previa</button>
</div>

<div class="preview">
  <div class="toolbar">
    <button class="btn-dl" onclick="dlPDF()">⬇ Descargar PDF</button>
  </div>
  <div id="voucher"></div>
</div>

<script>
const S = {
  tipo: 'ida',
  flightsIda: [], flightsVuelta: [], passengers: [],
  locs: [{ label: 'Localizador', value: '' }]
};

function ef() {
  return { num:'', fecha:'', fechaInput:'', origen:'', destino:'', aorig:'', adest:'',
           sh:'', lh:'', lf:'', al:'', cab:'Economy', duracion_min:0, found:false, editing:false };
}

function fmt12(t) {
  if (!t || !t.includes(':')) return { h:'--:--', ampm:'' };
  let [h, m] = t.split(':').map(Number);
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return { h: `${h}:${String(m).padStart(2,'0')}`, ampm };
}

function fmtDur(mins) {
  if (!mins || mins <= 0) return '';
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return h > 0 ? `${h}h${m > 0 ? ' ' + m + 'min' : ''}` : `${m}min`;
}

function toMins(t) {
  if (!t || !t.includes(':')) return null;
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}

function calcLayover(flights, i) {
  if (i >= flights.length - 1) return null;
  const arrMins = toMins(flights[i].lh);
  const depMins = toMins(flights[i+1].sh);
  if (arrMins === null || depMins === null) return null;
  let diff = depMins - arrMins;
  if (diff < 0) diff += 24 * 60;
  return diff > 0 ? diff : null;
}

function calcTotal(flights) {
  let total = 0;
  for (let i = 0; i < flights.length; i++) {
    total += flights[i].duracion_min || 0;
    if (i < flights.length - 1) {
      const lay = calcLayover(flights, i);
      if (lay) total += lay;
    }
  }
  return total;
}

function parseDurInput(val) {
  // Accept formats: "4h47min", "4h 47min", "4:47", "287" (minutes)
  if (!val) return 0;
  val = val.trim().toLowerCase();
  const hm = val.match(/(\d+)h\s*(\d+)?/);
  if (hm) return parseInt(hm[1]) * 60 + parseInt(hm[2] || 0);
  const colon = val.match(/^(\d+):(\d+)$/);
  if (colon) return parseInt(colon[1]) * 60 + parseInt(colon[2]);
  const mins = parseInt(val);
  if (!isNaN(mins)) return mins;
  return 0;
}

// ── TIPO ─────────────────────────────────────────────
function setType(t, el) {
  S.tipo = t;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  const vs = document.getElementById('vuelos-vuelta-section');
  const li = document.getElementById('label-ida');
  if (t === 'ida') { vs.style.display='none'; li.textContent='Vuelos de Ida'; }
  else if (t === 'idavuelta') { vs.style.display='block'; li.textContent='Vuelos de Ida'; }
  else { vs.style.display='none'; li.textContent='Tramos'; }
  render();
}

// ── LOCALIZADORES ────────────────────────────────────
function addLoc() { S.locs.push({ label: 'Localizador', value: '' }); buildLocs(); }
function removeLoc(i) { if (S.locs.length > 1) { S.locs.splice(i,1); buildLocs(); render(); } }
function buildLocs() {
  const c = document.getElementById('locs-list'); c.innerHTML = '';
  S.locs.forEach((l,i) => {
    c.innerHTML += `<div style="margin-bottom:6px">
      <div class="row2" style="margin-bottom:3px">
        <div><label>Etiqueta</label><input value="${l.label}" oninput="S.locs[${i}].label=this.value;render()"></div>
        <div><label>Número</label><input value="${l.value}" oninput="S.locs[${i}].value=this.value;render()"></div>
      </div>
      ${S.locs.length>1?`<button class="btn-rm" style="font-size:11px;background:none;border:none;cursor:pointer;color:#e05c5c" onclick="removeLoc(${i})">✕ Quitar</button>`:''}
    </div>`;
  });
}

// ── FLIGHT LOOKUP ────────────────────────────────────
async function lookup(dir, idx) {
  const list = dir==='ida' ? S.flightsIda : S.flightsVuelta;
  const f = list[idx];
  if (!f.num || !f.fecha) { alert('Ingresa el número de vuelo y la fecha primero.'); return; }
  const id = `${dir}-${idx}`;
  const sEl = document.getElementById('s-'+id);
  const dEl = document.getElementById('d-'+id);
  const btn = document.getElementById('b-'+id);
  sEl.className = 'status loading'; sEl.textContent = '🔍 Buscando información del vuelo...';
  btn.disabled = true;
  try {
    const res = await fetch('/api/buscar-vuelo', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ numero: f.num, fecha: f.fecha })
    });
    const json = await res.json();
    if (!json.ok) throw new Error(json.error);
    const info = json.data;
    f.origen=info.origen||''; f.destino=info.destino||'';
    f.aorig=info.aorig||''; f.adest=info.adest||'';
    f.sh=info.sh||''; f.lh=info.lh||'';
    f.lf=info.lf||f.fecha; f.al=info.al||'';
    f.cab=info.cab||'Economy';
    f.duracion_min = parseInt(info.duracion_min) || 0;
    f.found=true;
    f.editing=false;
    buildList(dir);
    const dur = fmtDur(f.duracion_min);
    dEl.className='found show';
    dEl.innerHTML=`
      <div class="dr"><span>Ruta</span><span>${f.origen} → ${f.destino}</span></div>
      <div class="dr"><span>Salida</span><span>${fmt12(f.sh).h} ${fmt12(f.sh).ampm} · ${f.fecha}</span></div>
      <div class="dr"><span>Llegada</span><span>${fmt12(f.lh).h} ${fmt12(f.lh).ampm} · ${f.lf}</span></div>
      <div class="dr"><span>Aerolínea</span><span>${f.al}</span></div>
      ${dur?`<div class="dr"><span>Duración</span><span>${dur}</span></div>`:''}`;
    // Update duration input
    const durInput = document.getElementById('dur-'+id);
    if (durInput && f.duracion_min > 0) durInput.value = fmtDur(f.duracion_min);
    sEl.className='status ok'; sEl.textContent='✓ Detalles encontrados. Verifica la duración abajo.';
    render();
  } catch(err) {
    sEl.className='status err'; sEl.textContent='✗ ' + (err.message||'No se pudo obtener información');
  } finally { btn.disabled=false; }
}

// ── FLIGHT UI ────────────────────────────────────────
function addFlight(dir) { (dir==='ida'?S.flightsIda:S.flightsVuelta).push(ef()); buildList(dir); render(); }
function removeFlight(dir,i) { (dir==='ida'?S.flightsIda:S.flightsVuelta).splice(i,1); buildList(dir); render(); }
function handleDate(dir,i,v) {
  const f=(dir==='ida'?S.flightsIda:S.flightsVuelta)[i];
  f.fechaInput=v;
  if(v){const[y,m,d]=v.split('-');f.fecha=`${d}/${m}/${y}`;f.lf=f.fecha;}
  buildList(dir);
}
function setNum(dir,i,v){(dir==='ida'?S.flightsIda:S.flightsVuelta)[i].num=v;}
function setCab(dir,i,v){(dir==='ida'?S.flightsIda:S.flightsVuelta)[i].cab=v;render();}
function setDur(dir,i,v){
  (dir==='ida'?S.flightsIda:S.flightsVuelta)[i].duracion_min = parseDurInput(v);
  render();
}

function toggleEdit(dir, i) {
  const list = dir==='ida' ? S.flightsIda : S.flightsVuelta;
  list[i].editing = !list[i].editing;
  buildList(dir);
}

function setField(dir, i, key, val) {
  const list = dir==='ida' ? S.flightsIda : S.flightsVuelta;
  list[i][key] = val;
  if (key === 'duracion_min') list[i][key] = parseDurInput(val);
  render();
}

function buildList(dir) {
  const list=dir==='ida'?S.flightsIda:S.flightsVuelta;
  const cont=document.getElementById('list-'+dir);
  cont.innerHTML='';
  const label = S.tipo==='multi' ? 'Tramo' : (dir==='ida'?'Tramo ida':'Tramo vuelta');
  list.forEach((f,i)=>{
    const id=`${dir}-${i}`;
    const div=document.createElement('div');
    div.className='fc';
    const editFields = f.editing ? `
      <div style="margin-top:8px;padding:8px;background:#0f2030;border-radius:6px;border:1px solid #2d6090">
        <div style="font-size:10px;color:#4a9fd4;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Edición manual</div>
        <div class="row2">
          <div><label>Código origen</label><input value="${f.origen}" placeholder="PTY" oninput="setField('${dir}',${i},'origen',this.value)"></div>
          <div><label>Código destino</label><input value="${f.destino}" placeholder="MAD" oninput="setField('${dir}',${i},'destino',this.value)"></div>
        </div>
        <label>Aeropuerto origen</label>
        <input value="${f.aorig}" placeholder="Tocumen International Airport" oninput="setField('${dir}',${i},'aorig',this.value)">
        <label>Aeropuerto destino</label>
        <input value="${f.adest}" placeholder="Barajas Airport" oninput="setField('${dir}',${i},'adest',this.value)">
        <div class="row2">
          <div><label>Hora salida (HH:MM)</label><input value="${f.sh}" placeholder="21:05" oninput="setField('${dir}',${i},'sh',this.value)"></div>
          <div><label>Fecha salida</label><input value="${f.fecha}" placeholder="10/08/2026" oninput="setField('${dir}',${i},'fecha',this.value)"></div>
        </div>
        <div class="row2">
          <div><label>Hora llegada (HH:MM)</label><input value="${f.lh}" placeholder="14:10" oninput="setField('${dir}',${i},'lh',this.value)"></div>
          <div><label>Fecha llegada</label><input value="${f.lf}" placeholder="11/08/2026" oninput="setField('${dir}',${i},'lf',this.value)"></div>
        </div>
        <label>Aerolínea</label>
        <input value="${f.al}" placeholder="Copa Airlines" oninput="setField('${dir}',${i},'al',this.value)">
        <label>Duración del vuelo</label>
        <input value="${fmtDur(f.duracion_min)||''}" placeholder="Ej: 4h47min" onchange="setField('${dir}',${i},'duracion_min',this.value)">
      </div>` : (f.found ? `
      <div class="found show" style="margin-top:6px">
        <div class="dr"><span>Ruta</span><span>${f.origen} → ${f.destino}</span></div>
        <div class="dr"><span>Salida</span><span>${fmt12(f.sh).h} ${fmt12(f.sh).ampm} · ${f.fecha}</span></div>
        <div class="dr"><span>Llegada</span><span>${fmt12(f.lh).h} ${fmt12(f.lh).ampm} · ${f.lf}</span></div>
        <div class="dr"><span>Aerolínea</span><span>${f.al}</span></div>
        <div class="dr"><span>Duración</span><span>${fmtDur(f.duracion_min)||'—'}</span></div>
      </div>` : '');

    div.innerHTML=`
      <div class="fc-head"><span>${label} ${i+1}${f.found?' ✓':''}</span><button class="btn-rm" onclick="removeFlight('${dir}',${i})">✕</button></div>
      <div class="row2">
        <div><label>N° de vuelo</label><input type="text" value="${f.num}" placeholder="CM444" oninput="setNum('${dir}',${i},this.value)"></div>
        <div><label>Fecha salida</label><input type="date" value="${f.fechaInput||''}" onchange="handleDate('${dir}',${i},this.value)"></div>
      </div>
      <label>Clase</label>
      <select onchange="setCab('${dir}',${i},this.value)">
        <option value="Economy" ${f.cab==='Economy'?'selected':''}>Economy</option>
        <option value="Premium" ${f.cab==='Premium'?'selected':''}>Premium</option>
        <option value="Business" ${f.cab==='Business'?'selected':''}>Business</option>
        <option value="First" ${f.cab==='First'?'selected':''}>First</option>
      </select>
      <button class="btn-lookup" id="b-${id}" onclick="lookup('${dir}',${i})">🔎 Buscar detalles del vuelo</button>
      <div class="status" id="s-${id}"></div>
      ${editFields}
      <button onclick="toggleEdit('${dir}',${i})" style="width:100%;margin-top:8px;padding:6px;border-radius:5px;background:none;border:1px solid #2d4a62;color:#7fa8c8;font-size:11px;cursor:pointer">
        ${f.editing ? '✓ Cerrar edición' : '✏️ Editar información manualmente'}
      </button>`;
    cont.appendChild(div);
  });
}

// ── TABS ─────────────────────────────────────────────
function switchTab(n,el){
  ['general','vuelos','pax'].forEach(t=>document.getElementById('tab-'+t).style.display='none');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('tab-'+n).style.display='block';
  el.classList.add('on');
}

// ── RENDER SEGMENTS ──────────────────────────────────
function renderSegments(flights) {
  let html = '';
  for (let i = 0; i < flights.length; i++) {
    const f = flights[i];
    const t1 = fmt12(f.sh);
    const t2 = fmt12(f.lh);
    const dur = fmtDur(f.duracion_min);
    html += `<div class="vseg">
      <div class="vtb">
        <div class="vtime">${t1.h}</div>
        <div class="vampm">${t1.ampm}</div>
        <div class="vdate">${f.fecha||''}</div>
        <div class="vap">${f.origen||'---'}</div>
        <div class="vapn">${f.aorig||''}</div>
      </div>
      <div class="vmid">
        <div class="vfnum">${f.num||'VUELO'}</div>
        <div class="vline"></div>
        ${dur?`<div class="vdur">${dur}</div>`:''}
        <div class="val">${f.al||''}</div>
        <div class="vcab">${f.cab||'Economy'}</div>
      </div>
      <div class="vtb">
        <div class="vtime">${t2.h}</div>
        <div class="vampm">${t2.ampm}</div>
        <div class="vdate">${f.lf||''}</div>
        <div class="vap">${f.destino||'---'}</div>
        <div class="vapn">${f.adest||''}</div>
      </div>
    </div>`;

    if (i < flights.length - 1) {
      const lay = calcLayover(flights, i);
      if (lay) {
        html += `<div class="vescala">
          <div class="vescala-text">Escala en <strong>${f.destino||'—'}</strong> · Tiempo de espera: <strong>${fmtDur(lay)}</strong></div>
        </div>`;
      }
    }
  }
  return html;
}

// ── RENDER VOUCHER ────────────────────────────────────
function render(){
  const ag=document.getElementById('agencia').value;
  const nota=document.getElementById('nota').value;

  const paxH = S.passengers.map(p=>`
    <div class="v-pax">
      <div class="pn">${p.nombre||'Pasajero'}</div>
      ${p.eticket?`<span class="pt">E-ticket: ${p.eticket}</span>`:''}
      ${p.asiento?`<span class="pt">✈ Asiento: ${p.asiento}</span>`:''}
      ${p.ff_num?`<span class="pt">★ FF ${p.ff_al}: ${p.ff_num}</span>`:''}
      ${p.meal?`<span class="pt">🍽 ${p.meal}</span>`:''}
      ${p.bagI?`<span class="pt">🧳 Ida: ${p.bagI}</span>`:''}
      ${(S.tipo==='idavuelta'&&p.bagV)?`<span class="pt">🔁 Vuelta: ${p.bagV}</span>`:''}
    </div>`).join('');

  const locsH = S.locs.map(l=>`
    <div class="vloc">
      <div class="vh-lbl">${l.label}</div>
      <div class="vh-val${S.locs.length===1?' big':''}">${l.value||'------'}</div>
    </div>`).join('');

  function buildSection(flights, label) {
    if (!flights.length) return '';
    const total = calcTotal(flights);
    const totalStr = total > 0 ? fmtDur(total) : '';
    return `<div class="vsec">${label} · ${flights.length} tramo${flights.length>1?'s':''}
      ${totalStr?`<span class="vsec-total">Total: ${totalStr}</span>`:''}
    </div>${renderSegments(flights)}`;
  }

  let sections = '';
  if (S.tipo === 'ida') {
    sections = S.flightsIda.length
      ? buildSection(S.flightsIda, 'Vuelo')
      : `<div style="color:#aaa;font-size:12px;padding:10px 0">Agrega vuelos en la pestaña Vuelos</div>`;
  } else if (S.tipo === 'idavuelta') {
    sections = buildSection(S.flightsIda, 'Ida') + buildSection(S.flightsVuelta, 'Vuelta');
    if (!sections) sections = `<div style="color:#aaa;font-size:12px;padding:10px 0">Agrega vuelos en la pestaña Vuelos</div>`;
  } else {
    sections = S.flightsIda.length
      ? buildSection(S.flightsIda, 'Itinerario')
      : `<div style="color:#aaa;font-size:12px;padding:10px 0">Agrega tramos en la pestaña Vuelos</div>`;
  }

  document.getElementById('voucher').innerHTML=`
    <div class="vdiv"></div>
    <div class="vh">
      <div>
        <div class="vh-logo">${ag||'FlyAway'}</div>
        <div style="font-size:10px;color:#7dc9f5;margin-top:4px">${S.tipo==='ida'?'Voucher — Solo Ida':S.tipo==='idavuelta'?'Voucher — Ida y Vuelta':'Voucher — Múltiples Tramos'}</div>
      </div>
      <div class="vlocs">${locsH}</div>
    </div>
    <div class="vb">
      ${S.passengers.length?`<div class="vsec">Pasajeros · ${S.passengers.length}</div><div class="v-paxes">${paxH}</div>`:''}
      ${sections}
    </div>
    <div class="vfoot"><div class="vfoot-note">${nota}</div><div class="vfoot-logo">${ag}</div></div>
    <div class="vdiv"></div>`;
}

function dlPDF(){
  const loc = S.locs[0]?.value || 'viaje';
  html2pdf().set({
    margin:0, filename:`voucher-${loc}.pdf`,
    image:{type:'jpeg',quality:0.98},
    html2canvas:{scale:2,useCORS:true},
    jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}
  }).from(document.getElementById('voucher')).save();
}
