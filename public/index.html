<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voucher de Viaje — FlyAway</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; color: #1a2b3c; display: flex; min-height: 100vh; }

.sidebar {
  width: 340px; min-width: 300px; background: #1a2b3c; color: #e8f0f7;
  padding: 20px 16px; overflow-y: auto; flex-shrink: 0; min-height: 100vh;
}
.sidebar h1 { font-size: 17px; font-weight: 700; color: #fff; margin-bottom: 3px; }
.sidebar .sub { font-size: 11px; color: #7fa8c8; margin-bottom: 16px; }
.sec { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #7fa8c8; margin: 14px 0 6px; }
label { font-size: 11px; color: #b0cde6; display: block; margin-bottom: 2px; margin-top: 6px; }
input, select {
  width: 100%; padding: 6px 9px; border-radius: 5px; border: 1px solid #2d4a62;
  background: #243d52; color: #e8f0f7; font-size: 12px; outline: none;
}
input:focus, select:focus { border-color: #4a9fd4; }
select option { background: #1a2b3c; }
.btn-add {
  display: block; width: 100%; margin-top: 8px; padding: 7px;
  background: #243d52; border: 1px dashed #4a9fd4; color: #4a9fd4;
  border-radius: 5px; font-size: 11px; cursor: pointer;
}
.btn-add:hover { background: #2d5470; }
.tabs { display: flex; gap: 3px; margin-bottom: 14px; }
.tab {
  flex: 1; padding: 6px 4px; text-align: center; font-size: 11px; font-weight: 600;
  border-radius: 5px; cursor: pointer; border: 1px solid #2d4a62;
  background: #243d52; color: #7fa8c8;
}
.tab.on { background: #1a6fa8; color: #fff; border-color: #1a6fa8; }
.fc { background: #1e3348; border-radius: 7px; padding: 10px; margin-bottom: 8px; border: 1px solid #2d4a62; }
.fc-head { display: flex; justify-content: space-between; align-items: center; font-size: 11px; font-weight: 600; color: #4a9fd4; margin-bottom: 8px; }
.btn-rm { background: none; border: none; color: #e05c5c; font-size: 12px; cursor: pointer; padding: 0 4px; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.btn-lookup {
  width: 100%; margin-top: 8px; padding: 7px; border-radius: 5px;
  background: linear-gradient(135deg, #1a6fa8, #4a9fd4);
  color: #fff; font-size: 12px; font-weight: 600; border: none; cursor: pointer;
}
.btn-lookup:disabled { opacity: .45; cursor: not-allowed; }
.status { font-size: 11px; margin-top: 6px; padding: 5px 8px; border-radius: 5px; display: none; }
.status.loading { display: block; background: #1a3a50; color: #7dc9f5; }
.status.ok { display: block; background: #0d3320; color: #5be0a0; }
.status.err { display: block; background: #3a1a1a; color: #e07070; }
.found { margin-top: 8px; padding: 8px; background: #152a3a; border-radius: 5px; display: none; font-size: 11px; border: 1px solid #2d5c40; }
.found.show { display: block; }
.dr { display: flex; justify-content: space-between; padding: 2px 0; }
.dr span:first-child { color: #7dc9f5; }
.dr span:last-child { color: #e8f0f7; font-weight: 600; }
.btn-gen {
  width: 100%; margin-top: 16px; padding: 11px; border-radius: 7px;
  background: linear-gradient(135deg, #1a6fa8, #4a9fd4);
  color: #fff; font-size: 13px; font-weight: 700; border: none; cursor: pointer;
}
.preview { flex: 1; padding: 20px; overflow-y: auto; background: #e8eef4; display: flex; flex-direction: column; align-items: center; }
.toolbar { width: 100%; max-width: 740px; display: flex; justify-content: flex-end; margin-bottom: 10px; }
.btn-dl {
  padding: 8px 16px; border-radius: 6px; font-size: 12px; font-weight: 600;
  cursor: pointer; border: none; background: #1a6fa8; color: #fff;
}
.btn-dl:hover { opacity: .85; }
#voucher {
  background: #fff; width: 100%; max-width: 740px;
  border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,.1); overflow: hidden;
}
.vh { background: linear-gradient(135deg, #0a3d62, #1a6fa8); padding: 24px 30px; display: flex; justify-content: space-between; align-items: flex-start; }
.vh-logo { font-size: 20px; font-weight: 800; color: #fff; }
.vh-info { text-align: right; }
.vh-lbl { font-size: 9px; color: #7dc9f5; text-transform: uppercase; letter-spacing: 1px; }
.vh-val { font-size: 13px; font-weight: 700; color: #fff; }
.vh-val.big { font-size: 22px; letter-spacing: 2px; }
.vb { padding: 22px 30px; }
.vsec { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #7fa8c8; margin: 16px 0 8px; display: flex; align-items: center; gap: 8px; }
.vsec::after { content: ''; flex: 1; height: 1px; background: #e0ecf7; }
.v-paxes { display: flex; gap: 10px; flex-wrap: wrap; }
.v-pax { background: #f0f7ff; border-left: 4px solid #1a6fa8; padding: 8px 14px; border-radius: 0 6px 6px 0; flex: 1; min-width: 160px; }
.v-pax .pn { font-size: 13px; font-weight: 700; color: #0a3d62; }
.v-pax .pt { font-size: 11px; color: #5a7fa0; margin-top: 2px; }
.vseg { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #f0f4f8; }
.vseg:last-child { border-bottom: none; }
.vtb { text-align: center; min-width: 85px; }
.vtime { font-size: 22px; font-weight: 800; color: #0a3d62; line-height: 1; }
.vdate { font-size: 10px; color: #7fa8c0; margin-top: 2px; }
.vap { font-size: 13px; font-weight: 700; color: #1a6fa8; margin-top: 2px; }
.vapn { font-size: 9px; color: #8aa0b0; margin-top: 1px; }
.vmid { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 0 10px; }
.vfnum { font-size: 10px; font-weight: 700; color: #fff; background: #1a6fa8; padding: 2px 8px; border-radius: 20px; margin-bottom: 5px; }
.vline { width: 100%; height: 2px; background: linear-gradient(90deg, #1a6fa8, #7dc9f5); position: relative; border-radius: 2px; }
.vline::before { content: '✈'; position: absolute; top: -8px; left: 50%; transform: translateX(-50%); font-size: 13px; color: #1a6fa8; }
.val { font-size: 10px; color: #7fa8c0; margin-top: 4px; }
.vcab { font-size: 10px; color: #7fa8c0; margin-top: 3px; background: #f0f7ff; padding: 1px 8px; border-radius: 10px; }
.vfoot { background: #f7fafd; border-top: 2px solid #e0ecf7; padding: 12px 30px; display: flex; justify-content: space-between; align-items: center; }
.vfoot-note { font-size: 11px; color: #7fa8c0; }
.vfoot-logo { font-size: 12px; font-weight: 700; color: #1a6fa8; }
.vdiv { height: 5px; background: linear-gradient(90deg, #0a3d62, #1a6fa8, #7dc9f5); }
</style>
</head>
<body>

<div class="sidebar">
  <h1>✈ Voucher de Viaje</h1>
  <p class="sub">Ingresa el vuelo y la fecha — buscamos los detalles automáticamente.</p>

  <div class="tabs">
    <div class="tab on" onclick="switchTab('general',this)">General</div>
    <div class="tab" onclick="switchTab('ida',this)">Ida</div>
    <div class="tab" onclick="switchTab('vuelta',this)">Vuelta</div>
    <div class="tab" onclick="switchTab('pax',this)">Pasajeros</div>
  </div>

  <div id="tab-general">
    <div class="sec">Agencia</div>
    <label>Nombre de la agencia</label>
    <input id="agencia" value="FlyAway" oninput="render()">
    <label>Localizador PNR</label>
    <input id="loc" value="" oninput="render()">
    <label>Localizador aerolínea</label>
    <input id="loc2" value="" oninput="render()">
    <label>Nota al pie</label>
    <input id="nota" value="Cada pasajero puede llevar una bolsa o mochila adicional como ítem personal." oninput="render()">
  </div>

  <div id="tab-ida" style="display:none">
    <div class="sec">Vuelos de Ida</div>
    <div id="list-ida"></div>
    <button class="btn-add" onclick="addFlight('ida')">+ Agregar tramo de ida</button>
  </div>

  <div id="tab-vuelta" style="display:none">
    <div class="sec">Vuelos de Vuelta</div>
    <div id="list-vuelta"></div>
    <button class="btn-add" onclick="addFlight('vuelta')">+ Agregar tramo de vuelta</button>
  </div>

  <div id="tab-pax" style="display:none">
    <div class="sec">Pasajeros</div>
    <div id="list-pax"></div>
    <button class="btn-add" onclick="addPax()">+ Agregar pasajero</button>
  </div>

  <button class="btn-gen" onclick="render()">↻ Actualizar vista previa</button>
</div>

<div class="preview">
  <div class="toolbar">
    <button class="btn-dl" onclick="dlPDF()">⬇ Descargar PDF</button>
  </div>
  <div id="voucher"></div>
</div>

<script>
const S = { flightsIda: [], flightsVuelta: [], passengers: [] };
function ef() { return { num:'', fecha:'', fechaInput:'', origen:'', destino:'', aorig:'', adest:'', sh:'', lh:'', lf:'', al:'', cab:'Económica', found:false }; }

async function lookup(dir, idx) {
  const list = dir==='ida' ? S.flightsIda : S.flightsVuelta;
  const f = list[idx];
  if (!f.num || !f.fecha) { alert('Ingresa el número de vuelo y la fecha primero.'); return; }
  const id = `${dir}-${idx}`;
  const sEl = document.getElementById('s-'+id);
  const dEl = document.getElementById('d-'+id);
  const btn = document.getElementById('b-'+id);
  sEl.className = 'status loading'; sEl.textContent = '🔍 Buscando información del vuelo...';
  btn.disabled = true;
  try {
    const res = await fetch('/api/buscar-vuelo', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ numero: f.num, fecha: f.fecha })
    });
    const json = await res.json();
    if (!json.ok) throw new Error(json.error);
    const info = json.data;
    f.origen=info.origen||''; f.destino=info.destino||'';
    f.aorig=info.aorig||''; f.adest=info.adest||'';
    f.sh=info.sh||''; f.lh=info.lh||'';
    f.lf=info.lf||f.fecha; f.al=info.al||'';
    f.cab=info.cab||'Económica'; f.found=true;
    dEl.className='found show';
    dEl.innerHTML=`
      <div class="dr"><span>Ruta</span><span>${f.origen} → ${f.destino}</span></div>
      <div class="dr"><span>Salida</span><span>${f.sh} · ${f.fecha}</span></div>
      <div class="dr"><span>Llegada</span><span>${f.lh} · ${f.lf}</span></div>
      <div class="dr"><span>Aerolínea</span><span>${f.al}</span></div>
      <div class="dr"><span>Cabina</span><span>${f.cab}</span></div>
      <div class="dr"><span>Origen</span><span>${f.aorig}</span></div>
      <div class="dr"><span>Destino</span><span>${f.adest}</span></div>`;
    sEl.className='status ok'; sEl.textContent='✓ Detalles encontrados correctamente';
    render();
  } catch(err) {
    sEl.className='status err'; sEl.textContent='✗ ' + (err.message||'No se pudo obtener información');
  } finally { btn.disabled=false; }
}

function addFlight(dir) { (dir==='ida'?S.flightsIda:S.flightsVuelta).push(ef()); buildList(dir); render(); }
function removeFlight(dir,i) { (dir==='ida'?S.flightsIda:S.flightsVuelta).splice(i,1); buildList(dir); render(); }
function handleDate(dir,i,v) {
  const f=(dir==='ida'?S.flightsIda:S.flightsVuelta)[i];
  f.fechaInput=v;
  if(v){const[y,m,d]=v.split('-');f.fecha=`${d}/${m}/${y}`;f.lf=f.fecha;}
  buildList(dir);
}
function setNum(dir,i,v){(dir==='ida'?S.flightsIda:S.flightsVuelta)[i].num=v;}

function buildList(dir) {
  const list=dir==='ida'?S.flightsIda:S.flightsVuelta;
  const cont=document.getElementById('list-'+dir);
  cont.innerHTML='';
  list.forEach((f,i)=>{
    const id=`${dir}-${i}`;
    const div=document.createElement('div');
    div.className='fc';
    div.innerHTML=`
      <div class="fc-head"><span>Tramo ${i+1}${f.found?' ✓':''}</span><button class="btn-rm" onclick="removeFlight('${dir}',${i})">✕</button></div>
      <div class="row2">
        <div><label>N° de vuelo</label><input type="text" value="${f.num}" placeholder="CM444" oninput="setNum('${dir}',${i},this.value)"></div>
        <div><label>Fecha salida</label><input type="date" value="${f.fechaInput||''}" onchange="handleDate('${dir}',${i},this.value)"></div>
      </div>
      <button class="btn-lookup" id="b-${id}" onclick="lookup('${dir}',${i})">🔎 Buscar detalles del vuelo</button>
      <div class="status" id="s-${id}"></div>
      <div class="found ${f.found?'show':''}" id="d-${id}">
        ${f.found?`<div class="dr"><span>Ruta</span><span>${f.origen} → ${f.destino}</span></div><div class="dr"><span>Salida</span><span>${f.sh} · ${f.fecha}</span></div><div class="dr"><span>Aerolínea</span><span>${f.al}</span></div>`:''}
      </div>`;
    cont.appendChild(div);
  });
}

function addPax(){S.passengers.push({nombre:'',eticket:'',bagI:'1x10kg + 1x23kg',bagV:'1x10kg + 1x23kg'});buildPax();render();}
function removePax(i){S.passengers.splice(i,1);buildPax();render();}
function buildPax(){
  const c=document.getElementById('list-pax');c.innerHTML='';
  S.passengers.forEach((p,i)=>{
    c.innerHTML+=`<div class="fc">
      <div class="fc-head"><span>Pasajero ${i+1}</span><button class="btn-rm" onclick="removePax(${i})">✕</button></div>
      <label>Nombre completo</label><input value="${p.nombre}" oninput="S.passengers[${i}].nombre=this.value;render()">
      <label>E-ticket</label><input value="${p.eticket}" oninput="S.passengers[${i}].eticket=this.value;render()">
      <div class="row2">
        <div><label>Equipaje ida</label><input value="${p.bagI}" oninput="S.passengers[${i}].bagI=this.value;render()"></div>
        <div><label>Equipaje vuelta</label><input value="${p.bagV}" oninput="S.passengers[${i}].bagV=this.value;render()"></div>
      </div>
    </div>`;
  });
}

function switchTab(n,el){
  ['general','ida','vuelta','pax'].forEach(t=>document.getElementById('tab-'+t).style.display='none');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('tab-'+n).style.display='block';
  el.classList.add('on');
}

function render(){
  const ag=document.getElementById('agencia').value;
  const loc=document.getElementById('loc').value;
  const loc2=document.getElementById('loc2').value;
  const nota=document.getElementById('nota').value;
  const seg=fs=>fs.map(f=>`
    <div class="vseg">
      <div class="vtb"><div class="vtime">${f.sh||'--:--'}</div><div class="vdate">${f.fecha||''}</div><div class="vap">${f.origen||'---'}</div><div class="vapn">${f.aorig||''}</div></div>
      <div class="vmid"><div class="vfnum">${f.num||'VUELO'}</div><div class="vline"></div><div class="val">${f.al||''}</div><div class="vcab">${f.cab||'Económica'}</div></div>
      <div class="vtb"><div class="vtime">${f.lh||'--:--'}</div><div class="vdate">${f.lf||''}</div><div class="vap">${f.destino||'---'}</div><div class="vapn">${f.adest||''}</div></div>
    </div>`).join('');
  const paxH=S.passengers.map(p=>`
    <div class="v-pax">
      <div class="pn">${p.nombre||'Pasajero'}</div>
      ${p.eticket?`<div class="pt">E-ticket: ${p.eticket}</div>`:''}
      ${p.bagI?`<div class="pt">🧳 Ida: ${p.bagI}</div>`:''}
      ${p.bagV?`<div class="pt">🔁 Vuelta: ${p.bagV}</div>`:''}
    </div>`).join('');
  document.getElementById('voucher').innerHTML=`
    <div class="vdiv"></div>
    <div class="vh">
      <div><div class="vh-logo">${ag||'FlyAway'}</div><div style="font-size:10px;color:#7dc9f5;margin-top:4px">Documento de Viaje</div></div>
      <div class="vh-info">
        <div class="vh-lbl">Localizador</div><div class="vh-val big">${loc||'------'}</div>
        ${loc2?`<div class="vh-lbl" style="margin-top:6px">Aerolínea</div><div class="vh-val">${loc2}</div>`:''}
      </div>
    </div>
    <div class="vb">
      ${S.passengers.length?`<div class="vsec">Pasajeros · ${S.passengers.length}</div><div class="v-paxes">${paxH}</div>`:''}
      ${S.flightsIda.length?`<div class="vsec">Ida · ${S.flightsIda.length} tramo${S.flightsIda.length>1?'s':''}</div>${seg(S.flightsIda)}`:`<div style="color:#aaa;font-size:12px;padding:10px 0">Agrega vuelos de ida en el panel izquierdo</div>`}
      ${S.flightsVuelta.length?`<div class="vsec">Vuelta · ${S.flightsVuelta.length} tramo${S.flightsVuelta.length>1?'s':''}</div>${seg(S.flightsVuelta)}`:''}
    </div>
    <div class="vfoot"><div class="vfoot-note">${nota}</div><div class="vfoot-logo">${ag}</div></div>
    <div class="vdiv"></div>`;
}

function dlPDF(){
  const loc=document.getElementById('loc').value;
  html2pdf().set({margin:0,filename:`voucher-${loc||'viaje'}.pdf`,image:{type:'jpeg',quality:0.98},html2canvas:{scale:2,useCORS:true},jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}}).from(document.getElementById('voucher')).save();
}

S.flightsIda.push(ef());S.flightsVuelta.push(ef());
S.passengers.push({nombre:'',eticket:'',bagI:'1x10kg + 1x23kg',bagV:'1x10kg + 1x23kg'});
buildList('ida');buildList('vuelta');buildPax();render();
</script>
</body>
</html>
