<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voucher de Viaje — FlyAway</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; color: #1a2b3c; display: flex; min-height: 100vh; }
.sidebar { width: 360px; min-width: 320px; background: #1e3a5c; color: #e8f0f7; padding: 20px 16px; overflow-y: auto; flex-shrink: 0; min-height: 100vh; }
.sidebar h1 { font-size: 17px; font-weight: 700; color: #fff; margin-bottom: 3px; }
.sidebar .sub { font-size: 11px; color: #7fa8c8; margin-bottom: 16px; }
.sec { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #7fa8c8; margin: 14px 0 6px; }
label { font-size: 11px; color: #b0cde6; display: block; margin-bottom: 2px; margin-top: 6px; }
input, select, textarea { width: 100%; padding: 6px 9px; border-radius: 5px; border: 1px solid #2d5070; background: #163050; color: #e8f0f7; font-size: 12px; outline: none; }
input:focus, select:focus, textarea:focus { border-color: #3d8fd1; }
select option { background: #1e3a5c; }
textarea { resize: vertical; line-height: 1.5; }
.btn-add { display: block; width: 100%; margin-top: 8px; padding: 7px; background: #163050; border: 1px dashed #3d8fd1; color: #3d8fd1; border-radius: 5px; font-size: 11px; cursor: pointer; }
.btn-add:hover { background: #1e4070; }
.tabs { display: flex; gap: 3px; margin-bottom: 14px; }
.tab { flex: 1; padding: 6px 4px; text-align: center; font-size: 11px; font-weight: 600; border-radius: 5px; cursor: pointer; border: 1px solid #2d5070; background: #163050; color: #7fa8c8; }
.tab.on { background: #3d8fd1; color: #fff; border-color: #3d8fd1; }
.fc { background: #163050; border-radius: 7px; padding: 10px; margin-bottom: 8px; border: 1px solid #2d5070; }
.fc-head { display: flex; justify-content: space-between; align-items: center; font-size: 11px; font-weight: 600; color: #3d8fd1; margin-bottom: 8px; }
.btn-rm { background: none; border: none; color: #e05c5c; font-size: 12px; cursor: pointer; padding: 0 4px; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.btn-parse { width: 100%; margin-top: 8px; padding: 9px; border-radius: 5px; background: linear-gradient(135deg, #3d8fd1, #5aaee8); color: #fff; font-size: 12px; font-weight: 700; border: none; cursor: pointer; }
.btn-parse:disabled { opacity: .45; cursor: not-allowed; }
.btn-add-manual { display: block; width: 100%; margin-top: 6px; padding: 7px; background: #163050; border: 1px dashed #7fa8c8; color: #7fa8c8; border-radius: 5px; font-size: 11px; cursor: pointer; }
.status { font-size: 11px; margin-top: 6px; padding: 5px 8px; border-radius: 5px; display: none; }
.status.loading { display: block; background: #1a3a50; color: #7dc9f5; }
.status.ok { display: block; background: #0d3320; color: #5be0a0; }
.status.err { display: block; background: #3a1a1a; color: #e07070; }
.edit-block { margin-top:8px; padding:8px; background:#0f2030; border-radius:6px; border:1px solid #2d5070; }
.edit-block .elabel { font-size:10px; color:#3d8fd1; font-weight:700; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; display:block; }
.btn-gen { width: 100%; margin-top: 16px; padding: 11px; border-radius: 7px; background: linear-gradient(135deg, #3d8fd1, #5aaee8); color: #fff; font-size: 13px; font-weight: 700; border: none; cursor: pointer; }
.type-selector { display: flex; gap: 4px; margin-bottom: 12px; }
.type-btn { flex: 1; padding: 7px 4px; text-align: center; font-size: 10px; font-weight: 600; border-radius: 5px; cursor: pointer; border: 1px solid #2d5070; background: #163050; color: #7fa8c8; }
.type-btn.on { background: #3d8fd1; color: #fff; border-color: #3d8fd1; }
.preview { flex: 1; padding: 20px; overflow-y: auto; background: #e8eef4; display: flex; flex-direction: column; align-items: center; }
.toolbar { width: 100%; max-width: 740px; display: flex; justify-content: flex-end; margin-bottom: 10px; gap: 8px; align-items: center; }
.btn-dl { padding: 8px 16px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; background: #3d8fd1; color: #fff; }
.btn-dl:hover { opacity: .85; }
#voucher { background: #fff; width: 100%; max-width: 740px; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,.1); overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
.vh { background: linear-gradient(135deg, #3d8fd1 0%, #3d8fd1 60%, #2a6fa8 100%); padding: 22px 30px; display: flex; justify-content: space-between; align-items: center; }
.vh-brand { display: flex; flex-direction: column; }
.vh-logo-img { height: 52px; width: auto; }
.vh-contact { margin-top: 6px; display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
.vh-contact-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: rgba(255,255,255,0.9); }
.vh-ref { margin-top: 5px; font-size: 11px; font-weight: 700; color: #fff; letter-spacing: 0.5px; }
.vlocs { display: flex; gap: 20px; flex-wrap: wrap; text-align: right; }
.vloc { text-align: right; }
.vh-lbl { font-size: 9px; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 1px; }
.vh-val { font-size: 12px; font-weight: 700; color: #fff; }
.vh-val.big { font-size: 20px; letter-spacing: 2px; }
.vb { padding: 20px 30px; }
.vsec { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #3d8fd1; margin: 16px 0 10px; display: flex; align-items: center; gap: 8px; }
.vsec::after { content: ''; flex: 1; height: 1px; background: #e0ecf7; }
.vsec-total { font-size: 10px; color: #3d8fd1; font-weight: 700; background: #e8f4ff; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
.v-paxes { display: flex; flex-direction: column; gap: 8px; }
.v-pax { background: #f5f9ff; border-left: 4px solid #3d8fd1; padding: 10px 16px; border-radius: 0 6px 6px 0; }
.v-pax .pn { font-size: 13px; font-weight: 700; color: #1e3a5c; margin-bottom: 6px; }
.v-pax .pt { font-size: 11px; color: #5a7fa0; display: block; margin-top: 2px; }
.vseg { display: grid; grid-template-columns: 100px 1fr 100px; align-items: center; padding: 14px 0; border-bottom: 1px solid #f0f4f8; gap: 8px; }
.vseg:last-of-type { border-bottom: none; }
.vtb { text-align: center; }
.vtime { font-size: 22px; font-weight: 800; color: #1e3a5c; line-height: 1; }
.vampm { font-size: 11px; font-weight: 700; color: #3d8fd1; margin-top: 1px; }
.vdate { font-size: 10px; color: #7fa8c0; margin-top: 3px; }
.vap { font-size: 14px; font-weight: 700; color: #3d8fd1; margin-top: 3px; }
.vapn { font-size: 9px; color: #8aa0b0; margin-top: 2px; line-height: 1.3; }
.vmid { display: flex; flex-direction: column; align-items: center; }
.vfnum { font-size: 10px; font-weight: 700; color: #fff; background: #3d8fd1; padding: 2px 10px; border-radius: 20px; margin-bottom: 6px; }
.vline { width: 100%; height: 2px; background: linear-gradient(90deg, #3d8fd1, #c9a97a); position: relative; border-radius: 2px; }
.vdur { font-size: 10px; color: #7fa8c0; margin-top: 5px; }
.val { font-size: 10px; color: #7fa8c0; margin-top: 2px; }
.vcab-economy { font-size: 10px; color: #fff; margin-top: 2px; background: #c9b99a; padding: 1px 8px; border-radius: 10px; }
.vcab-premium { font-size: 10px; color: #fff; margin-top: 2px; background: #b8a080; padding: 1px 8px; border-radius: 10px; }
.vcab-business { font-size: 10px; color: #fff; margin-top: 2px; background: #a08060; padding: 1px 8px; border-radius: 10px; }
.vcab-first { font-size: 10px; color: #fff; margin-top: 2px; background: #7a5c3a; padding: 1px 8px; border-radius: 10px; }
.vavion { font-size: 10px; color: #8aa0b0; margin-top: 2px; }
.vescala { display: flex; align-items: center; justify-content: center; padding: 7px 16px; background: #fdf6ec; border-left: 3px solid #c9a97a; border-right: 3px solid #c9a97a; }
.vescala-text { font-size: 11px; color: #8a6a30; }
.vescala-text strong { color: #5a3e00; }
.vfoot { background: #f7fafd; border-top: 1px solid #e0ecf7; padding: 12px 30px; }
.vfoot-note { font-size: 11px; color: #7fa8c0; }
.vdiv { height: 5px; background: linear-gradient(90deg, #3d8fd1, #2a6fa8, #c9a97a); }
</style>
</head>
<body>

<div class="sidebar">
  <h1>✈ <span style="color:#fff">Fly</span><span style="color:#c9a97a">away</span></h1>
  <p class="sub">Pega el itinerario y el sistema extrae todos los vuelos automáticamente.</p>
  <div class="tabs">
    <div class="tab on" onclick="switchTab('general',this)">General</div>
    <div class="tab" onclick="switchTab('vuelos',this)">Vuelos</div>
    <div class="tab" onclick="switchTab('pax',this)">Pasajeros</div>
  </div>

  <div id="tab-general">
    <div class="sec">Tipo de voucher</div>
    <div class="type-selector">
      <div class="type-btn on" onclick="setType('ida',this)">Solo ida</div>
      <div class="type-btn" onclick="setType('idavuelta',this)">Ida y vuelta</div>
      <div class="type-btn" onclick="setType('multi',this)">Múltiples tramos</div>
    </div>
    <div class="sec">Referencia interna</div>
    <label>TKT#</label>
    <input id="ref" value="" placeholder="4700" oninput="render()">
    <div class="sec">Nota al pie</div>
    <input id="nota" value="Cada pasajero puede llevar una bolsa o mochila adicional como ítem personal." oninput="render()">
    <div class="sec">Localizadores</div>
    <div id="locs-list"></div>
    <button class="btn-add" onclick="addLoc()">+ Agregar localizador</button>
  </div>

  <div id="tab-vuelos" style="display:none">
    <div class="sec">Pegar itinerario</div>
    <textarea id="itinerario" rows="6" placeholder="Pega aquí el texto del itinerario (aerolínea, GDS Sabre/Amadeus, email de confirmación...)"></textarea>
    <button class="btn-parse" id="btn-parse" onclick="parseItinerary()">✨ Extraer vuelos automáticamente</button>
    <div class="status" id="parse-status"></div>
    <div id="vuelos-ida-section" style="margin-top:14px">
      <div class="sec" id="label-ida">Vuelos de Ida</div>
      <div id="list-ida"></div>
      <button class="btn-add-manual" onclick="addFlight('ida')">+ Agregar tramo manualmente</button>
    </div>
    <div id="vuelos-vuelta-section" style="display:none;margin-top:10px">
      <div class="sec">Vuelos de Vuelta</div>
      <div id="list-vuelta"></div>
      <button class="btn-add-manual" onclick="addFlight('vuelta')">+ Agregar tramo manualmente</button>
    </div>
  </div>

  <div id="tab-pax" style="display:none">
    <div class="sec">Pasajeros</div>
    <div id="list-pax"></div>
    <button class="btn-add" onclick="addPax()">+ Agregar pasajero</button>
  </div>

  <button class="btn-gen" onclick="render()">↻ Actualizar vista previa</button>
</div>

<div class="preview">
  <div class="toolbar">
    <select id="lang-select" onchange="render()" style="padding:7px 10px;border-radius:6px;border:1px solid #c0d0e0;font-size:12px;color:#1e3a5c;background:#fff;cursor:pointer">
      <option value="es">🇪🇸 Español</option>
      <option value="en">🇺🇸 English</option>
      <option value="pt">🇧🇷 Português</option>
      <option value="he">🇮🇱 עברית</option>
    </select>
    <button class="btn-dl" onclick="dlPDF()">⬇ Descargar PDF</button>
  </div>
  <div id="voucher"></div>
</div>

<script>
const BRAND = {
  whatsapp: '+507 6327-2362',
  email: 'travel@flyawaypty.com'
};

const LANGS = {
  es: { dir:'ltr', passengers:'Pasajeros', flight:'Vuelo', flightOut:'Vuelo de Ida', outbound:'Ida', inbound:'Vuelta', itinerary:'Itinerario', leg:'Tramo', total:'Total', stopover:'Escala en', waitTime:'Tiempo de espera', eticket:'E-TICKET', bagAllowed:'Maleta permitida', bagOutbound:'Maleta permitida ida', bagReturn:'Maleta permitida vuelta', seat:'Asiento', meal:'Special meal', download:'⬇ Descargar PDF', resCode:'CÓDIGO DE RESERVACIÓN' },
  en: { dir:'ltr', passengers:'Passengers', flight:'Flight', flightOut:'Outbound Flight', outbound:'Outbound', inbound:'Return', itinerary:'Itinerary', leg:'Segment', total:'Total', stopover:'Layover at', waitTime:'Waiting time', eticket:'E-TICKET', bagAllowed:'Baggage allowance', bagOutbound:'Outbound baggage', bagReturn:'Return baggage', seat:'Seat', meal:'Special meal', download:'⬇ Download PDF', resCode:'RESERVATION CODE' },
  pt: { dir:'ltr', passengers:'Passageiros', flight:'Voo', flightOut:'Voo de Ida', outbound:'Ida', inbound:'Volta', itinerary:'Itinerário', leg:'Trecho', total:'Total', stopover:'Escala em', waitTime:'Tempo de espera', eticket:'E-TICKET', bagAllowed:'Bagagem permitida', bagOutbound:'Bagagem permitida ida', bagReturn:'Bagagem permitida volta', seat:'Assento', meal:'Refeição especial', download:'⬇ Baixar PDF', resCode:'CÓDIGO DE RESERVA' },
  he: { dir:'rtl', passengers:'נוסעים', flight:'טיסה', flightOut:'טיסת הלוך', flights:'טיסות', outbound:'יציאה', inbound:'חזרה', itinerary:'מסלול', leg:'טיסה', legs:'טיסות', total:'סה״כ', stopover:'עצירה ב', waitTime:'המתנה', eticket:'כרטיס אלקטרוני', bagAllowed:'כבודה כלולה', bagOutbound:'כבודה כלולה הלוך', bagReturn:'כבודה כלולה חזור', seat:'מושבים', meal:'ארוחה מיוחדת', download:'⬇ הורד PDF', resCode:'קוד הזמנה' }
};

function getLang() { return LANGS[document.getElementById('lang-select')?.value||'es']||LANGS.es; }

const S = {
  tipo:'ida', flightsIda:[], flightsVuelta:[], passengers:[],
  locs:[{label:'CÓDIGO DE RESERVACIÓN', value:''}]
};

function ef() {
  return {num:'',fecha:'',origen:'',destino:'',aorig:'',adest:'',sh:'',lh:'',lf:'',al:'',cab:'Economy',duracion_min:0,layover_override:0,avion:'',found:false};
}

function fmt12(t) {
  if(!t||!t.includes(':')) return {h:'--:--',ampm:''};
  let [h,m]=t.split(':').map(Number);
  const ampm=h>=12?'PM':'AM'; h=h%12||12;
  return {h:`${h}:${String(m).padStart(2,'0')}`,ampm};
}
function fmtDur(mins) {
  if(!mins||mins<=0) return '';
  const h=Math.floor(mins/60),m=mins%60;
  return h>0?`${h}h${m>0?' '+m+'min':''}`:`${m}min`;
}
function toMins(t) {
  if(!t||!t.includes(':')) return null;
  const [h,m]=t.split(':').map(Number); return h*60+m;
}
function calcLayover(flights,i) {
  if(i>=flights.length-1) return null;
  if(flights[i].layover_override>0) return flights[i].layover_override;
  const a=toMins(flights[i].lh),d=toMins(flights[i+1].sh);
  if(a===null||d===null) return null;
  let diff=d-a; if(diff<0) diff+=24*60;
  return diff>0?diff:null;
}
function calcTotal(flights) {
  let t=0;
  for(let i=0;i<flights.length;i++){
    t+=flights[i].duracion_min||0;
    if(i<flights.length-1){const l=calcLayover(flights,i);if(l)t+=l;}
  }
  return t;
}
function parseDurInput(v) {
  if(!v) return 0; v=v.trim().toLowerCase();
  const hm=v.match(/(\d+)h\s*(\d+)?/); if(hm) return parseInt(hm[1])*60+parseInt(hm[2]||0);
  const col=v.match(/^(\d+):(\d+)$/); if(col) return parseInt(col[1])*60+parseInt(col[2]);
  const n=parseInt(v); return isNaN(n)?0:n;
}

const waIcon=`<svg width="12" height="12" viewBox="0 0 24 24" fill="#ffffff"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>`;
const emailIcon=`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/></svg>`;

async function parseItinerary() {
  const texto=document.getElementById('itinerario').value.trim();
  if(!texto){alert('Pega el texto del itinerario primero.');return;}
  const sEl=document.getElementById('parse-status'),btn=document.getElementById('btn-parse');
  sEl.className='status loading';sEl.textContent='✨ Extrayendo información de los vuelos...';
  btn.disabled=true;
  try {
    const res=await fetch('/api/buscar-vuelo',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({texto})});
    const json=await res.json();
    if(!json.ok) throw new Error(json.error);
    const flights=json.flights;
    if(!flights||!flights.length) throw new Error('No se encontraron vuelos en el texto');
    S.flightsIda=flights.map(f=>({...ef(),...f,found:true}));
    S.flightsVuelta=[];
    buildList('ida');buildList('vuelta');
    sEl.className='status ok';
    sEl.textContent=`✓ ${flights.length} vuelo${flights.length>1?'s':''} extraído${flights.length>1?'s':''}. Revisa y corrige si es necesario.`;
    render();
  } catch(err) {
    sEl.className='status err';sEl.textContent='✗ '+(err.message||'No se pudo procesar el itinerario');
  } finally {btn.disabled=false;}
}

function setType(t,el) {
  S.tipo=t;
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  const vs=document.getElementById('vuelos-vuelta-section'),li=document.getElementById('label-ida');
  if(t==='ida'){vs.style.display='none';li.textContent='Vuelos de Ida';}
  else if(t==='idavuelta'){vs.style.display='block';li.textContent='Vuelos de Ida';}
  else{vs.style.display='none';li.textContent='Tramos';}
  render();
}

function addLoc(){S.locs.push({label:'Localizador',value:''});buildLocs();}
function removeLoc(i){if(S.locs.length>1){S.locs.splice(i,1);buildLocs();render();}}
function buildLocs(){
  const c=document.getElementById('locs-list');c.innerHTML='';
  S.locs.forEach((l,i)=>{
    c.innerHTML+=`<div style="margin-bottom:6px">
      <label style="color:#7fa8c8;font-size:10px">Número</label>
      <input value="${l.value.toUpperCase()}" style="text-transform:uppercase" oninput="S.locs[${i}].value=this.value.toUpperCase();render()">
      ${S.locs.length>1?`<button style="font-size:11px;background:none;border:none;cursor:pointer;color:#e05c5c;margin-top:4px" onclick="removeLoc(${i})">✕ Quitar</button>`:''}
    </div>`;
  });
}

function addFlight(dir){(dir==='ida'?S.flightsIda:S.flightsVuelta).push(ef());buildList(dir);render();}
function removeFlight(dir,i){(dir==='ida'?S.flightsIda:S.flightsVuelta).splice(i,1);buildList(dir);render();}
function setField(dir,i,key,val){
  const list=dir==='ida'?S.flightsIda:S.flightsVuelta;
  list[i][key]=(key==='duracion_min'||key==='layover_override')?parseDurInput(val):val;
  render();
}
function buildList(dir){
  const list=dir==='ida'?S.flightsIda:S.flightsVuelta;
  const cont=document.getElementById('list-'+dir);cont.innerHTML='';
  const label=S.tipo==='multi'?'Tramo':(dir==='ida'?'Tramo ida':'Tramo vuelta');
  list.forEach((f,i)=>{
    const div=document.createElement('div');div.className='fc';
    div.innerHTML=`
      <div class="fc-head"><span>${label} ${i+1}${f.found?' ✓':''}</span><button class="btn-rm" onclick="removeFlight('${dir}',${i})">✕</button></div>
      <div class="edit-block">
        <span class="elabel">Información del vuelo</span>
        <div class="row2">
          <div><label>N° vuelo</label><input value="${f.num}" placeholder="CM444" oninput="setField('${dir}',${i},'num',this.value)"></div>
          <div><label>Clase</label>

          <div><label>Llegada (HH:MM)</label><input value="${f.lh}" placeholder="14:10" oninput="setField('${dir}',${i},'lh',this.value)"></div>
          <div><label>Fecha llegada</label><input value="${f.lf}" placeholder="11/08/2026" oninput="setField('${dir}',${i},'lf',this.value)"></div>

          <div><label>Duración vuelo</label><input value="${fmtDur(f.duracion_min)||''}" placeholder="4h47min" onchange="setField('${dir}',${i},'duracion_min',this.value)"></div>

}

function switchTab(n,el){
  ['general','vuelos','pax'].forEach(t=>document.getElementById('tab-'+t).style.display='none');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('tab-'+n).style.display='block';
  el.classList.add('on');
}

function renderSegments(flights,L){
  if(!L) L=getLang();
  const isRTL = L.dir==='rtl';
  let html='';
  for(let i=0;i<flights.length;i++){
    const f=flights[i],t1=fmt12(f.sh),t2=fmt12(f.lh),dur=fmtDur(f.duracion_min);
    const planeStyle = isRTL ? 'position:absolute;top:-9px;left:50%;transform:translateX(-50%) scaleX(-1);font-size:14px;color:#3d8fd1' : 'position:absolute;top:-9px;left:50%;transform:translateX(-50%);font-size:14px;color:#3d8fd1';
    html+=`<div class="vseg">
      <div class="vtb"><div class="vtime">${t1.h}</div><div class="vampm">${t1.ampm}</div><div class="vdate">${f.fecha||''}</div><div class="vap">${f.origen||'---'}</div><div class="vapn">${f.aorig||''}</div></div>
      <div class="vmid"><div class="vfnum">${f.num||'VUELO'}</div><div class="vline" style="position:relative"><div style="${planeStyle}">✈</div></div>${dur?`<div class="vdur">${dur}</div>`:''}<div class="val">${f.al||''}</div><div class="vcab-${(f.cab||'economy').toLowerCase().replace(' ','')}">${f.cab||'Economy'}</div>${f.avion?`<div class="vavion">${f.avion}</div>`:''}</div>
      <div class="vtb"><div class="vtime">${t2.h}</div><div class="vampm">${t2.ampm}</div><div class="vdate">${f.lf||''}</div><div class="vap">${f.destino||'---'}</div><div class="vapn">${f.adest||''}</div></div>
    </div>`;
    if(i<flights.length-1){
      const lay=calcLayover(flights,i);
      if(lay){
        let layText;
        if(isRTL){
          const h=Math.floor(lay/60), m=lay%60;
          if(h>0 && m>0) layText=`${h} שעות ${m} דקות`;
          else if(h===1) layText=`שעה אחת`;
          else if(h>1) layText=`${h} שעות`;
          else layText=`${m} דקות`;
        } else {
          layText=fmtDur(lay);
        }
        html+=`<div class="vescala"><div class="vescala-text">${L.stopover} <strong>${f.destino||'—'}</strong> · ${L.waitTime}: <strong>${layText}</strong></div></div>`;
      }
    }
  }
  return html;
}

function render(){
  const nota=document.getElementById('nota').value;
  const ref=document.getElementById('ref').value.trim();
  const L=getLang();
  const dlBtn=document.querySelector('.btn-dl');
  if(dlBtn) dlBtn.textContent=L.download;
  const paxH=S.passengers.map(p=>{
    const hasExtra = p.asiento || (p.ff_al&&p.ff_num) || p.meal;
    const isHe = L.dir==='rtl';
    const mealLabels = isHe
      ? {KSML:'ארוחה כשרה', SKML:'ארוחת כשר למהדרין', VGML:'ארוחה טבעונית', CHML:'ארוחת ילדים'}
      : {KSML:'Kosher Meal', SKML:'Strict Kosher Meal', VGML:'Vegan Meal', CHML:"Children's Meal"};
    if(hasExtra){
      return `<div class="v-pax" ${L.dir==='rtl'?'style="direction:rtl;text-align:right"':''}>
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div style="display:flex;flex-direction:column;justify-content:space-between;min-height:70px">
            <div class="pn">${p.apellido&&p.nombre?`${p.apellido} / ${p.nombre}`:p.apellido||p.nombre||'PASAJERO'}</div>
            <div style="margin-top:auto;padding-top:10px">
              ${p.asiento?`<span class="pt">${L.seat}: ${p.asiento.toUpperCase()}</span>`:''}
              ${p.ff_al&&p.ff_num?`<span class="pt">${p.ff_al.toUpperCase()} # ${p.ff_num.toUpperCase()}</span>`:''}
              ${p.meal?`<span class="pt">${(mealLabels[p.meal]||p.meal).toUpperCase()}</span>`:''}
            </div>
          </div>
          <div style="text-align:right;flex-shrink:0;margin-left:16px">
            ${p.eticket?`<div style="font-size:14px;font-weight:700;color:#1e3a5c;margin-bottom:2px">${p.eticket.toUpperCase()}</div>
            <div style="font-size:11px;color:#5a7fa0;margin-bottom:8px">${L.eticket}</div>`:''}
            ${p.bagI?`<div style="font-size:9px;color:#8aa8c0;text-transform:uppercase;letter-spacing:0.5px">${S.tipo==='idavuelta'?L.bagOutbound:L.bagAllowed}</div>
            <div style="font-size:12px;color:#5a7fa0;font-weight:600">${p.bagI.toUpperCase()}</div>`:''}
            ${(S.tipo==='idavuelta'&&p.bagV)?`<div style="font-size:9px;color:#8aa8c0;text-transform:uppercase;letter-spacing:0.5px;margin-top:4px">${L.bagReturn}</div>
            <div style="font-size:12px;color:#5a7fa0;font-weight:600">${p.bagV.toUpperCase()}</div>`:''}
          </div>
        </div>
      </div>`;
    } else {
      return `<div class="v-pax" ${L.dir==='rtl'?'style="direction:rtl;text-align:right"':''}>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div class="pn">${p.apellido&&p.nombre?`${p.apellido} / ${p.nombre}`:p.apellido||p.nombre||'PASAJERO'}</div>
          <div style="display:flex;align-items:center;gap:20px;flex-shrink:0;margin-left:16px">
            ${p.eticket?`<div style="text-align:right">
              <div style="font-size:14px;font-weight:700;color:#1e3a5c;margin-bottom:1px">${p.eticket.toUpperCase()}</div>
              <div style="font-size:11px;color:#5a7fa0">${L.eticket}</div>
            </div>`:''}
            ${p.bagI?`<div style="text-align:right">
              <div style="font-size:9px;color:#8aa8c0;text-transform:uppercase;letter-spacing:0.5px">${S.tipo==='idavuelta'?L.bagOutbound:L.bagAllowed}</div>
              <div style="font-size:12px;color:#5a7fa0;font-weight:600">${p.bagI.toUpperCase()}</div>
              ${(S.tipo==='idavuelta'&&p.bagV)?`<div style="font-size:9px;color:#8aa8c0;text-transform:uppercase;letter-spacing:0.5px;margin-top:3px">${L.bagReturn}</div>
              <div style="font-size:12px;color:#5a7fa0;font-weight:600">${p.bagV.toUpperCase()}</div>`:''}
            </div>`:''}
          </div>
        </div>
      </div>`;
    }
  }).join('');
  const locsH=S.locs.map(l=>`<div class="vloc"><div class="vh-lbl">${L.resCode}</div><div class="vh-val${S.locs.length===1?' big':''}">${l.value||'------'}</div></div>`).join('');
  function buildSection(flights,label){
    if(!flights.length) return '';
    const total=calcTotal(flights),ts=total>0?fmtDur(total):'';
    const legWord = L.dir==='rtl' ? (flights.length>1?'טיסות':'טיסה') : `${L.leg}${flights.length>1?'s':''}`;
    return `<div class="vsec">${label} · ${flights.length} ${legWord}${ts?`<span class="vsec-total">${L.total}: ${ts}</span>`:''}</div>${renderSegments(flights,L)}`;
  }
  let sections='';
  if(S.tipo==='ida') sections=S.flightsIda.length?buildSection(S.flightsIda,L.itinerary):`<div style="color:#aaa;font-size:12px;padding:10px 0">Pega el itinerario en la pestaña Vuelos</div>`;
  else if(S.tipo==='idavuelta'){sections=buildSection(S.flightsIda,L.outbound)+buildSection(S.flightsVuelta,L.inbound);if(!sections)sections=`<div style="color:#aaa;font-size:12px;padding:10px 0">Pega el itinerario en la pestaña Vuelos</div>`;}
  else sections=S.flightsIda.length?buildSection(S.flightsIda,L.itinerary):`<div style="color:#aaa;font-size:12px;padding:10px 0">Pega el itinerario en la pestaña Vuelos</div>`;
  const vd=L.dir==='rtl'?'direction:rtl':'';
  document.getElementById('voucher').innerHTML=`
    <div class="vdiv"></div>
    <div class="vh" style="${vd}">
      <div class="vh-brand">
        <img src="/logo.png" class="vh-logo-img" alt="Flyaway">
        <div class="vh-contact">
          <div class="vh-contact-item">${waIcon} ${BRAND.whatsapp}</div>
          <div class="vh-contact-item">${emailIcon} ${BRAND.email}</div>
        </div>
        ${ref?`<div class="vh-ref">TKT# ${ref}</div>`:''}
      </div>
      <div class="vlocs">${locsH}</div>
    </div>
    <div class="vb" style="${vd}">
      ${S.passengers.length?`<div class="vsec">${L.passengers} · ${S.passengers.length}</div><div class="v-paxes">${paxH}</div>`:''}
      ${sections}
    </div>
    <div class="vfoot" style="${vd}"><div class="vfoot-note">${nota}</div></div>
    <div class="vdiv"></div>`;
}

function dlPDF(){
  const ref=document.getElementById('ref').value.trim();
  const filename=ref?`TKT${ref}.pdf`:`voucher-${S.locs[0]?.value||'viaje'}.pdf`;
  const el=document.getElementById('voucher');
  const sidebar=document.querySelector('.sidebar');
  const preview=document.querySelector('.preview');

  // Save styles
  const prevMax=el.style.maxWidth, prevRad=el.style.borderRadius, prevShadow=el.style.boxShadow, prevWidth=el.style.width;
  const prevSidebar=sidebar.style.display;
  const prevPadding=preview.style.padding;

  // Expand voucher, hide sidebar
  sidebar.style.display='none';
  preview.style.padding='0';
  el.style.maxWidth='100%'; el.style.width='100%';
  el.style.borderRadius='0'; el.style.boxShadow='none';

  html2pdf().set({
    margin:0, filename,
    image:{type:'jpeg',quality:0.98},
    html2canvas:{scale:2,useCORS:true,scrollX:0,scrollY:0},
    jsPDF:{unit:'in',format:'letter',orientation:'portrait'}
  }).from(el).save().then(()=>{
    sidebar.style.display=prevSidebar;
    preview.style.padding=prevPadding;
    el.style.maxWidth=prevMax; el.style.width=prevWidth;
    el.style.borderRadius=prevRad; el.style.boxShadow=prevShadow;
  });
}

S.passengers.push({apellido:'',nombre:'',eticket:'',asiento:'',ff_num:'',ff_al:'',meal:'',bagI:'1 x 50 LB',bagV:'1 x 50 LB'});
